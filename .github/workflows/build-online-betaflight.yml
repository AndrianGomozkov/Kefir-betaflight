name: Build online Kefir Betaflight VTX

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: "Original Betaflight App repository"
        required: true
        default: "betaflight/betaflight-configurator"
      upstream_ref:
        description: "Branch or tag to build"
        required: true
        default: "master"
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve upstream source
        id: upstream
        shell: bash
        run: |
          REPO="${{ github.event.inputs.upstream_repository }}"
          REF="${{ github.event.inputs.upstream_ref }}"
          if [ -z "$REPO" ]; then REPO="betaflight/betaflight-configurator"; fi
          if [ -z "$REF" ]; then REF="master"; fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Using upstream: $REPO @ $REF"

      - name: Download Betaflight App source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf app
          git clone --depth 1 --branch "${{ steps.upstream.outputs.ref }}" "https://github.com/${{ steps.upstream.outputs.repo }}.git" app
          echo "Betaflight source downloaded. Checking expected VTX file:"
          if [ ! -f app/src/js/tabs/vtx.js ]; then
            echo "ERROR: app/src/js/tabs/vtx.js was not found. Showing VTX candidates:"
            find app -maxdepth 8 -iname '*vtx*.js' -print || true
            echo "Top-level app files:"
            ls -la app || true
            exit 1
          fi
          ls -la app/src/js/tabs/vtx.js

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Apply Kefir VTX visual-only patch
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import path from "node:path";

          const repoRoot = path.resolve("app");
          const vtxPath = path.join(repoRoot, "src", "js", "tabs", "vtx.js");

          if (!fs.existsSync(vtxPath)) {
              console.error(`ERROR: Cannot find ${vtxPath}`);
              console.error("This workflow must run after cloning betaflight/betaflight-configurator into ./app");
              process.exit(1);
          }

          let source = fs.readFileSync(vtxPath, "utf8");
          console.log(`Loaded ${vtxPath}, ${source.length} bytes`);

          if (source.includes("KEFIR_VTX_ONE_BASED_UI")) {
              console.log("Kefir VTX UI patch is already applied. Nothing to do.");
              process.exit(0);
          }

          const helpers = `
          // Kefir VTX One-Based UI patch.
          // Visual-only: Betaflight internally still receives and stores original values.
          const KEFIR_VTX_ONE_BASED_UI = true;

          function getVtxTablePowerValueVisualOffset(powerLevelList) {
              if (!KEFIR_VTX_ONE_BASED_UI || !Array.isArray(powerLevelList) || powerLevelList.length === 0) {
                  return 0;
              }

              const values = powerLevelList
                  .map((item) => Number.parseInt(item?.vtxtable_powerlevel_value, 10))
                  .filter((value) => Number.isFinite(value));

              if (values.length !== powerLevelList.length || values.length === 0) {
                  return 0;
              }

              const min = Math.min(...values);
              const max = Math.max(...values);
              const hasZero = values.includes(0);
              const count = values.length;

              // SmartAudio 2.0 / control-index style tables are typically 0,1,2,3...
              // Real mW tables like 25,200,500,800 must stay unchanged.
              const looksLikeZeroBasedControlValues = hasZero && min === 0 && max <= count;

              return looksLikeZeroBasedControlValues ? 1 : 0;
          }

          function getCurrentVtxPowerValueVisualOffset() {
              if (typeof TABS.vtx.vtxTablePowerValueVisualOffset === "number") {
                  return TABS.vtx.vtxTablePowerValueVisualOffset;
              }

              return getVtxTablePowerValueVisualOffset(TABS.vtx.VTXTABLE_POWERLEVEL_LIST);
          }

          function vtxTablePowerValueToUi(value, offset) {
              const numericValue = Number.parseInt(value, 10);

              if (!Number.isFinite(numericValue)) {
                  return "";
              }

              return numericValue + offset;
          }

          function vtxTablePowerValueToBetaflight(value, offset) {
              const numericValue = Number.parseInt(value, 10);

              if (!Number.isFinite(numericValue)) {
                  return 0;
              }

              return Math.max(0, numericValue - offset);
          }
          `;

          function replaceOnce(regex, replacement, label) {
              const before = source;
              source = source.replace(regex, replacement);
              if (source === before) {
                  console.error(`ERROR: Patch point not found: ${label}`);
                  console.error("The upstream Betaflight VTX tab changed. Nearby source checks:");
                  for (const needle of [
                      "vtx.isVtxDeviceStatusReady",
                      "#vtx_table_powerlevels",
                      "VTXTABLE_POWERLEVEL_LIST",
                      "dump_html_to_msp",
                  ]) {
                      console.error(` - ${needle}: ${source.includes(needle) ? "FOUND" : "NOT FOUND"}`);
                  }
                  process.exit(2);
              }
              console.log(`Patched: ${label}`);
          }

          replaceOnce(
              /};\s*vtx\.isVtxDeviceStatusReady\s*=\s*function\s*\(\)\s*{/, 
              `};\n${helpers}\nvtx.isVtxDeviceStatusReady = function () {`,
              "insert visual-only helper functions",
          );

          replaceOnce(
              /\$\("#vtx_table_powerlevels"\)\.val\(FC\.VTX_CONFIG\.vtx_table_powerlevels\);\s*\/\/ Populate power levels/,
              `$("#vtx_table_powerlevels").val(FC.VTX_CONFIG.vtx_table_powerlevels);\n        TABS.vtx.vtxTablePowerValueVisualOffset = getVtxTablePowerValueVisualOffset(TABS.vtx.VTXTABLE_POWERLEVEL_LIST);\n        // Populate power levels`,
              "calculate visual offset before rendering power values",
          );

          replaceOnce(
              /\$\(`#vtx_table_powerlevels_\$\{i\}`\)\.val\(\s*TABS\.vtx\.VTXTABLE_POWERLEVEL_LIST\[i - 1\]\.vtxtable_powerlevel_value\s*\);/,
              `$(\`#vtx_table_powerlevels_\${i}\`).val(\n                vtxTablePowerValueToUi(\n                    TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value,\n                    getCurrentVtxPowerValueVisualOffset(),\n                ),\n            );`,
              "render zero-based power values as one-based in UI",
          );

          replaceOnce(
              /TABS\.vtx\.VTXTABLE_POWERLEVEL_LIST\[i - 1\]\.vtxtable_powerlevel_value\s*=\s*parseInt\(\s*\$\(`#vtx_table_powerlevels_\$\{i\}`\)\.val\(\),?\s*\);/,
              `TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value = vtxTablePowerValueToBetaflight(\n            $(\`#vtx_table_powerlevels_\${i}\`).val(),\n            getCurrentVtxPowerValueVisualOffset(),\n        );`,
              "convert one-based UI power values back before Save / Save File / Save Lua",
          );

          fs.writeFileSync(vtxPath, source, "utf8");
          console.log("Done. Kefir VTX visual-only patch applied.");
          NODE

      - name: Run conversion safety test
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          function getOffset(list) {
              if (!Array.isArray(list) || list.length === 0) return 0;
              const values = list.map((value) => Number.parseInt(value, 10)).filter(Number.isFinite);
              if (values.length !== list.length || values.length === 0) return 0;
              const min = Math.min(...values);
              const max = Math.max(...values);
              return values.includes(0) && min === 0 && max <= values.length ? 1 : 0;
          }
          function toUi(values) {
              const offset = getOffset(values);
              return values.map((value) => Number.parseInt(value, 10) + offset);
          }
          function toBf(values, sourceValues) {
              const offset = getOffset(sourceValues);
              return values.map((value) => Math.max(0, Number.parseInt(value, 10) - offset));
          }
          const zeroBased = [0, 1, 2, 3];
          const zeroUi = toUi(zeroBased);
          const zeroSaved = toBf(zeroUi, zeroBased);
          const mw = [25, 200, 500, 800];
          const mwUi = toUi(mw);
          const mwSaved = toBf(mwUi, mw);
          console.log("zeroBased UI:", zeroUi.join(" "), "saved:", zeroSaved.join(" "));
          console.log("mW UI:", mwUi.join(" "), "saved:", mwSaved.join(" "));
          if (zeroUi.join(",") !== "1,2,3,4") process.exit(10);
          if (zeroSaved.join(",") !== "0,1,2,3") process.exit(11);
          if (mwUi.join(",") !== "25,200,500,800") process.exit(12);
          if (mwSaved.join(",") !== "25,200,500,800") process.exit(13);
          console.log("Conversion safety test passed.");
          NODE

      - name: Install dependencies
        working-directory: app
        shell: bash
        run: npm ci || npm install

      - name: Build PWA for GitHub Pages
        working-directory: app
        shell: bash
        run: npm run build -- --base=./

      - name: Locate build output and add marker files
        id: dist
        shell: bash
        run: |
          set -euo pipefail
          if [ -d app/src/dist ]; then
            DIST="app/src/dist"
          elif [ -d app/dist ]; then
            DIST="app/dist"
          else
            echo "ERROR: Cannot find build output. Showing dist candidates:"
            find app -maxdepth 4 -type d -iname 'dist' -print || true
            exit 1
          fi
          touch "$DIST/.nojekyll"
          cat > "$DIST/KEFIR_VTX_BUILD_INFO.txt" <<EOF
          Kefir Betaflight VTX One-Based UI build
          Visual-only patch: zero-based VTX table control power values are shown as one-based in UI.
          Saved Betaflight/MSP/JSON/Lua values remain original and compatible.
          Source: ${{ steps.upstream.outputs.repo }} @ ${{ steps.upstream.outputs.ref }}
          EOF
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"
          echo "Publishing: $DIST"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.dist }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
