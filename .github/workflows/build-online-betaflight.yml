name: Build online Kefir Betaflight VTX 2025.12.2

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-online-betaflight.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kefir-betaflight-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Kefir Betaflight
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPOSITORY: betaflight/betaflight-configurator
      UPSTREAM_REF: 2025.12.2
      HUSKY: "0"

    steps:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Betaflight App source
        shell: bash
        run: |
          set -euo pipefail

          rm -rf app

          echo "Repository: $UPSTREAM_REPOSITORY"
          echo "Ref: $UPSTREAM_REF"

          if git clone --depth 1 --branch "$UPSTREAM_REF" "https://github.com/$UPSTREAM_REPOSITORY.git" app; then
            echo "Cloned by branch/tag: $UPSTREAM_REF"
          else
            echo "Branch/tag clone failed, trying commit checkout..."
            git clone --depth 1 "https://github.com/$UPSTREAM_REPOSITORY.git" app
            cd app
            git fetch --depth 1 origin "$UPSTREAM_REF"
            git checkout FETCH_HEAD
            cd ..
          fi

          echo "Current Betaflight commit:"
          cd app
          git rev-parse --short HEAD
          cd ..

          echo "Checking VTX file:"
          if [ ! -f app/src/js/tabs/vtx.js ]; then
            echo "ERROR: app/src/js/tabs/vtx.js not found."
            echo "Found VTX candidates:"
            find app -iname '*vtx*' -type f | sort
            exit 1
          fi

          echo "OK: app/src/js/tabs/vtx.js exists"

      - name: Patch VTX table visual power values
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          const file = "app/src/js/tabs/vtx.js";

          if (!fs.existsSync(file)) {
              console.error("Cannot find:", file);
              process.exit(1);
          }

          let src = fs.readFileSync(file, "utf8");

          if (src.includes("KEFIR ONE-BASED VTX UI PATCH")) {
              console.log("Kefir patch is already present. Skipping.");
              process.exit(0);
          }

          function fail(message) {
              console.error("");
              console.error("PATCH ERROR:", message);
              console.error("");
              console.error("Debug info:");
              console.error("File length:", src.length);
              console.error("Contains vtx_table_powerlevels_${i}:", src.includes("vtx_table_powerlevels_${i}"));
              console.error("Contains vtxtable_powerlevel_value:", src.includes("vtxtable_powerlevel_value"));
              console.error("Contains dump_html_to_msp:", src.includes("dump_html_to_msp"));
              console.error("");

              const p = src.indexOf("vtx_table_powerlevels_${i}");
              if (p >= 0) {
                  console.error("Snippet around vtx_table_powerlevels_${i}:");
                  console.error(src.slice(Math.max(0, p - 800), Math.min(src.length, p + 1200)));
              }

              process.exit(1);
          }

          const displayRegex = /\$\\(`#vtx_table_powerlevels_\$\{i\}`\\)\.val\(\s*TABS\.vtx\.VTXTABLE_POWERLEVEL_LIST\[i - 1\]\.vtxtable_powerlevel_value,?\s*\);/;

          if (!displayRegex.test(src)) {
              fail("Cannot find UI display assignment for VTX power values.");
          }

          const displayReplacement = [
              "// KEFIR ONE-BASED VTX UI PATCH START - visual display",
              "const kefirPowerValuesAreZeroBased = TABS.vtx.VTXTABLE_POWERLEVEL_LIST",
              "    .slice(0, FC.VTX_CONFIG.vtx_table_powerlevels)",
              "    .every((item, index) => Number(item.vtxtable_powerlevel_value) === index);",
              "const kefirRawPowerValue = Number(TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value);",
              "$(`#vtx_table_powerlevels_${i}`).val(",
              "    kefirPowerValuesAreZeroBased ? kefirRawPowerValue + 1 : kefirRawPowerValue,",
              ");",
              "// KEFIR ONE-BASED VTX UI PATCH END - visual display"
          ].join("\n");

          src = src.replace(displayRegex, displayReplacement);

          const savePrepareRegex = /(\/\/ Power levels\s*FC\.VTX_CONFIG\.vtx_table_powerlevels = parseInt\(\$\("#vtx_table_powerlevels"\)\.val\(\)\);\s*)TABS\.vtx\.VTXTABLE_POWERLEVEL_LIST = \[\];/;

          if (!savePrepareRegex.test(src)) {
              fail("Cannot find save preparation area before VTX power list reset.");
          }

          const savePrepareInsert = [
              "// KEFIR ONE-BASED VTX UI PATCH START - detect visual one-based values before clearing list",
              "const kefirOneBasedVisualPowerValues = Array.from(",
              "    { length: FC.VTX_CONFIG.vtx_table_powerlevels },",
              "    (_, index) => parseInt($(`#vtx_table_powerlevels_${index + 1}`).val()),",
              ").every((value, index) => value === index + 1);",
              "// KEFIR ONE-BASED VTX UI PATCH END - detect visual one-based values before clearing list"
          ].join("\n");

          src = src.replace(savePrepareRegex, (match, prefix) => {
              return `${prefix}\n${savePrepareInsert}\nTABS.vtx.VTXTABLE_POWERLEVEL_LIST = [];`;
          });

          const saveAssignmentRegex = /TABS\.vtx\.VTXTABLE_POWERLEVEL_LIST\[i - 1\]\.vtxtable_powerlevel_value = parseInt\(\s*\$\\(`#vtx_table_powerlevels_\$\{i\}`\\)\.val\(\),\s*\);/;

          if (!saveAssignmentRegex.test(src)) {
              fail("Cannot find save assignment for VTX power values.");
          }

          const saveAssignmentReplacement = [
              "// KEFIR ONE-BASED VTX UI PATCH START - convert visual value back to Betaflight raw value",
              "const kefirUiPowerValue = parseInt($(`#vtx_table_powerlevels_${i}`).val());",
              "TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value =",
              "    kefirOneBasedVisualPowerValues ? kefirUiPowerValue - 1 : kefirUiPowerValue;",
              "// KEFIR ONE-BASED VTX UI PATCH END - convert visual value back to Betaflight raw value"
          ].join("\n");

          src = src.replace(saveAssignmentRegex, saveAssignmentReplacement);

          fs.writeFileSync(file, src);

          console.log("Kefir VTX visual patch applied successfully.");
          console.log("Patched file:", file);
          console.log("Patched file length:", src.length);
          NODE

          echo "Checking JavaScript syntax..."
          node --check app/src/js/tabs/vtx.js

      - name: Build Betaflight App
        shell: bash
        run: |
          set -euo pipefail

          cd app

          echo "Node version:"
          node --version

          echo "NPM version:"
          npm --version

          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lock file found. Using npm ci..."
            npm ci --no-audit --no-fund
          else
            echo "No package-lock.json found. Using npm install..."
            npm install --no-audit --no-fund --legacy-peer-deps
          fi

          npm run build

      - name: Locate build output
        id: dist
        shell: bash
        run: |
          set -euo pipefail

          if [ -f app/src/dist/index.html ]; then
            DIST_DIR="app/src/dist"
          elif [ -f app/dist/index.html ]; then
            DIST_DIR="app/dist"
          else
            echo "ERROR: Cannot find build output index.html"
            echo "Candidates:"
            find app -maxdepth 4 -name index.html -type f | sort
            exit 1
          fi

          echo "Build output: $DIST_DIR"
          echo "dist_dir=$DIST_DIR" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.dist.outputs.dist_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
