name: Build online Kefir Betaflight VTX 2025.12.2

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: "Official Betaflight App repository"
        required: true
        default: "betaflight/betaflight-configurator"
      upstream_ref:
        description: "Release tag/branch/commit. Default is App Version 2025.12.2 (a2d0f50)."
        required: true
        default: "2025.12.2"
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "20.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kefir wrapper repository
        uses: actions/checkout@v4

      - name: Download Betaflight App 2025.12.2 source
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.event.inputs.upstream_repository || 'betaflight/betaflight-configurator' }}"
          REF="${{ github.event.inputs.upstream_ref || '2025.12.2' }}"

          echo "Repository: ${REPO}"
          echo "Ref: ${REF}"

          rm -rf app
          git init app
          cd app
          git remote add origin "https://github.com/${REPO}.git"

          # First try a release tag / branch. If the user entered a commit SHA, fetch fallback handles it.
          if git fetch --depth=1 origin "${REF}"; then
            git checkout FETCH_HEAD
          elif git fetch --depth=1 origin "refs/tags/${REF}:refs/tags/${REF}"; then
            git checkout "${REF}"
          else
            echo "Shallow fetch failed; doing normal fetch and checkout fallback..."
            git fetch origin
            git checkout "${REF}"
          fi

          echo "Checked out commit:"
          git rev-parse --short HEAD

          echo "package.json version line:"
          node -e "const p=require('./package.json'); console.log(p.version, p.engines && p.engines.node);"

      - name: Patch VTX tab for Kefir one-based visual power values
        shell: bash
        run: |
          set -euo pipefail

          VTX_FILE="app/src/js/tabs/vtx.js"
          if [ ! -f "$VTX_FILE" ]; then
            echo "ERROR: expected old Betaflight 2025.12.2 VTX file was not found: $VTX_FILE"
            echo "VTX candidates in downloaded source:"
            find app/src -iname '*vtx*' -maxdepth 6 -type f | sort || true
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = 'app/src/js/tabs/vtx.js';
          let src = fs.readFileSync(path, 'utf8');

          const helperMarker = 'const vtx = { vtxTableSavePending: false, vtxTableFactoryBandsSupported: false, MAX_POWERLEVEL_VALUES: 8, MAX_BAND_VALUES: 8, MAX_BAND_CHANNELS_VALUES: 8, VTXTABLE_BAND_LIST: [], VTXTABLE_POWERLEVEL_LIST: [], analyticsChanges: {}, updating: true, env: new djv(), };';
          const helpers = `${helperMarker}
// KEFIR ONE-BASED VTX UI PATCH START
// This patch is visual-only. Betaflight/MSP/JSON keep the original power values.
// It only displays sequential zero-based VTX table power values like 0 1 2 3 as 1 2 3 4.
// Normal milliwatt tables like 25 200 500 800 are not shifted.
function kefirIsOneBasedVisualPowerValues(list = TABS.vtx.VTXTABLE_POWERLEVEL_LIST) {
    if (!Array.isArray(list) || list.length === 0) {
        return false;
    }

    const values = list
        .map((item) => parseInt(item && item.vtxtable_powerlevel_value))
        .filter((value) => Number.isFinite(value));

    if (values.length === 0) {
        return false;
    }

    const isSequentialZeroBased = values.every((value, index) => value === index);
    const isSmallPowerIndexTable = values.every(
        (value) => value >= 0 && value < TABS.vtx.MAX_POWERLEVEL_VALUES,
    );

    return isSequentialZeroBased && isSmallPowerIndexTable;
}

function kefirPowerValueToUi(value) {
    const numericValue = parseInt(value);
    if (!Number.isFinite(numericValue)) {
        return value;
    }
    return kefirIsOneBasedVisualPowerValues() ? numericValue + 1 : numericValue;
}

function kefirPowerValueFromUi(value) {
    const numericValue = parseInt(value);
    if (!Number.isFinite(numericValue)) {
        return 0;
    }
    return kefirIsOneBasedVisualPowerValues() ? Math.max(0, numericValue - 1) : numericValue;
}
// KEFIR ONE-BASED VTX UI PATCH END`;

          if (src.includes('KEFIR ONE-BASED VTX UI PATCH START')) {
            console.log('Kefir patch already present; skipping helper insertion.');
          } else {
            if (!src.includes(helperMarker)) {
              throw new Error('Cannot find helper insertion marker in vtx.js. Wrong Betaflight App version?');
            }
            src = src.replace(helperMarker, helpers);
          }

          const displayOld = '$(`#vtx_table_powerlevels_${i}`).val(TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value);';
          const displayNew = '$(`#vtx_table_powerlevels_${i}`).val( kefirPowerValueToUi(TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value), );';

          if (!src.includes(displayNew)) {
            if (!src.includes(displayOld)) {
              throw new Error('Cannot find VTX power value UI display assignment in vtx.js.');
            }
            src = src.replace(displayOld, displayNew);
          }

          const saveOld = 'TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value = parseInt( $(`#vtx_table_powerlevels_${i}`).val(), );';
          const saveNew = 'TABS.vtx.VTXTABLE_POWERLEVEL_LIST[i - 1].vtxtable_powerlevel_value = kefirPowerValueFromUi( $(`#vtx_table_powerlevels_${i}`).val(), );';

          if (!src.includes(saveNew)) {
            if (!src.includes(saveOld)) {
              throw new Error('Cannot find VTX power value save assignment in dump_html_to_msp().');
            }
            src = src.replace(saveOld, saveNew);
          }

          fs.writeFileSync(path, src);
          console.log('Kefir VTX one-based visual patch applied to:', path);
          NODE

      - name: Verify Kefir VTX conversion logic
        shell: bash
        run: |
          set -euo pipefail

          grep -q "KEFIR ONE-BASED VTX UI PATCH START" app/src/js/tabs/vtx.js
          grep -q "kefirPowerValueToUi" app/src/js/tabs/vtx.js
          grep -q "kefirPowerValueFromUi" app/src/js/tabs/vtx.js

          node <<'NODE'
          function isShifted(values) {
              return values.length > 0 && values.every((value, index) => value === index) && values.every((value) => value >= 0 && value < 8);
          }
          function toUi(values) {
              return isShifted(values) ? values.map((value) => value + 1) : values;
          }
          function fromUi(uiValues, originalValues) {
              return isShifted(originalValues) ? uiValues.map((value) => Math.max(0, value - 1)) : uiValues;
          }

          const rawSa20 = [0, 1, 2, 3];
          const uiSa20 = toUi(rawSa20);
          const savedSa20 = fromUi(uiSa20, rawSa20);
          const mwRaw = [25, 200, 500, 800];
          const mwUi = toUi(mwRaw);
          const mwSaved = fromUi(mwUi, mwRaw);

          if (JSON.stringify(uiSa20) !== JSON.stringify([1, 2, 3, 4])) {
              throw new Error('Zero-based VTX table was not shown as one-based UI.');
          }
          if (JSON.stringify(savedSa20) !== JSON.stringify(rawSa20)) {
              throw new Error('One-based UI did not save back to original Betaflight values.');
          }
          if (JSON.stringify(mwUi) !== JSON.stringify(mwRaw) || JSON.stringify(mwSaved) !== JSON.stringify(mwRaw)) {
              throw new Error('Milliwatt VTX table was shifted, but it must not be changed.');
          }

          console.log('Conversion test OK: [0,1,2,3] -> UI [1,2,3,4] -> saved [0,1,2,3].');
          console.log('Milliwatt table OK: [25,200,500,800] stays unchanged.');
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          HUSKY=0 npm ci --ignore-scripts

      - name: Build Betaflight App for GitHub Pages
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          npm run build -- --base="/${{ github.event.repository.name }}/"

      - name: Find build output
        id: build_output
        shell: bash
        run: |
          set -euo pipefail
          if [ -d app/dist ]; then
            BUILD_DIR="app/dist"
          elif [ -d app/src/dist ]; then
            BUILD_DIR="app/src/dist"
          else
            echo "ERROR: cannot find build output directory. Dist candidates:"
            find app -maxdepth 3 -type d -name dist | sort || true
            exit 1
          fi
          echo "Using build output: $BUILD_DIR"
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html" || true
          echo "path=$BUILD_DIR" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.build_output.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
